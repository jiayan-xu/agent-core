<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI 助手</title>
<style>
  :root { --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a; --text: #e0e0e0; --accent: #d4a853; --msg-user: #1e2a1e; --msg-agent: #1a1a2e; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system,'Segoe UI',sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  #header { padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  #header h1 { font-size: 16px; font-weight: 600; color: var(--accent); }
  #header .status { font-size: 12px; color: #888; margin-left: auto; }
  #header .status.ok { color: #4caf50; }
  #header .status.nok { color: #ff6b6b; }
  #setup { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px; padding:40px; }
  #setup h2 { color: var(--accent); font-size: 22px; }
  #setup p { color: #888; font-size: 14px; max-width: 400px; text-align: center; line-height: 1.8; }
  #setup input { width: 100%; max-width: 360px; padding: 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); font-size: 14px; }
  #setup input:focus { border-color: var(--accent); outline: none; }
  #setup button { padding: 10px 30px; border: none; border-radius: 6px; background: var(--accent); color: #000; font-size: 14px; font-weight: 600; cursor: pointer; }
  #setup button:hover { opacity: 0.9; }
  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 8px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--msg-user); border: 1px solid #2a4a2a; }
  .msg.agent { align-self: flex-start; background: var(--msg-agent); border: 1px solid #2a2a4a; }
  .msg .time { font-size: 11px; color: #666; margin-top: 4px; }
  #input-area { padding: 12px 20px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; }
  #input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 14px; outline: none; }
  #input:focus { border-color: var(--accent); }
  #send { padding: 10px 20px; border: none; border-radius: 6px; background: var(--accent); color: #000; font-size: 14px; font-weight: 600; cursor: pointer; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
  .welcome { text-align: center; color: #666; padding: 40px 20px; font-size: 14px; line-height: 1.8; }
</style>
</head>
<body>
<div id="header">
  <h1>&#x1F916; <span id="title">AI 助手</span></h1>
  <span class="status" id="status">&#x25CF;</span>
</div>

<div id="setup">
  <h2>&#x1F44B; 首次使用</h2>
  <p>填写下面的信息就可以开始聊天了。<br>API 密钥找管理员获取。</p>
  <input id="s-name" placeholder="你的名字" value="">
  <input id="s-apikey" type="password" placeholder="API 密钥">
  <details style="max-width:360px;width:100%">
    <summary style="color:#666;font-size:12px;cursor:pointer;text-align:left">高级设置</summary>
    <input id="s-server" placeholder="服务器地址" value="http://192.168.1.171:9003" style="margin-top:8px">
  </details>
  <button onclick="saveConfig()">开始使用</button>
</div>

<div id="chat" style="display:none;flex:1;display:none;flex-direction:column">
  <div id="messages">
    <div class="welcome"><p>你好！有什么可以帮你的？</p></div>
  </div>
  <div id="input-area">
    <input id="input" type="text" placeholder="输入消息..." autofocus>
    <button id="send">发送</button>
  </div>
</div>

<script>
async function saveConfig() {
  const name = document.getElementById('s-name').value.trim();
  const apikey = document.getElementById('s-apikey').value.trim();
  const server = document.getElementById('s-server').value.trim();
  if (!name || !apikey) { alert('请填写名字和 API 密钥'); return; }
  const resp = await fetch('/api/save-config', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({agent_id: name, api_key: apikey, server: server}),
  });
  const data = await resp.json();
  if (data.ok) {
    document.getElementById('title').textContent = name;
    document.getElementById('status').textContent = '\u25CF 已连接';
    document.getElementById('status').className = 'status ok';
    document.getElementById('setup').style.display = 'none';
    document.getElementById('chat').style.display = 'flex';
    document.getElementById('input').focus();
  } else {
    alert('保存失败: ' + (data.error || ''));
  }
}

async function chat() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const msgs = document.getElementById('messages');
  const addMsg = (role, text) => {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    const time = document.createElement('div');
    time.className = 'time';
    time.textContent = new Date().toLocaleTimeString();
    div.appendChild(time);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  };

  addMsg('user', text);
  const sendBtn = document.getElementById('send');
  sendBtn.disabled = true; sendBtn.textContent = '...';
  document.getElementById('status').textContent = '\u25CF 思考中';
  document.getElementById('status').className = 'status';

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: text}),
    });
    const data = await resp.json();
    if (data.reply) addMsg('agent', data.reply);
  } catch(e) {
    addMsg('agent', '连接失败: ' + e.message);
  }

  sendBtn.disabled = false; sendBtn.textContent = '发送';
  document.getElementById('status').textContent = '\u25CF 已连接';
  document.getElementById('status').className = 'status ok';
}

document.getElementById('send').addEventListener('click', chat);
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); chat(); }
});

// 检查是否已配置
fetch('/api/config').then(r=>r.json()).then(cfg => {
  if (cfg.configured) {
    document.getElementById('s-name').value = cfg.agent_id;
    document.getElementById('s-server').value = cfg.server || 'http://192.168.1.171:9003';
    document.getElementById('title').textContent = cfg.agent_id;
    document.getElementById('status').textContent = '\u25CF 已连接';
    document.getElementById('status').className = 'status ok';
    document.getElementById('setup').style.display = 'none';
    document.getElementById('chat').style.display = 'flex';
  }
});
</script>
</body>
</html>
