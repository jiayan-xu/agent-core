<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agent</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
<style>
html,body{height:100%;}
:root { --bg: #ffffff; --surface: #ffffff; --border: #e0e0e0; --text: #333333; --accent: #1a73e8; --msg-user: #e3f2fd; --msg-agent: #ffffff; --tool-bg: #f0f0f0; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,'Segoe UI','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); display:flex; flex-direction:column; overflow:hidden; }
#header { padding:10px 20px; background:var(--surface); border-bottom:1px solid var(--border); display:flex;  gap:12px; flex-shrink:0; height:52px; box-shadow:0 1px 2px rgba(0,0,0,0.05); }
#header .logo { height:32px; width:auto; display:block; }
#header h1 { font-size:16px; font-weight:600; color:var(--text); }
#header .st { font-size:11px; color:#999; }
#header .st.ok { color:#4caf50; }
#header .st.busy { color:#f57c00; }
#chat { flex:1; display:flex; flex-direction:row; min-height:0; background:var(--bg);  }
#msgs { flex:1; overflow-y:auto; padding:16px 24px; display:flex; flex-direction:column; gap:8px;  width:100%; box-sizing:border-box; }
.msg { max-width:85%; padding:10px 14px; border-radius:8px; line-height:1.6; font-size:14px; }
.msg.user { align-self:flex-end; background:var(--msg-user); border:1px solid #bbdefb; }
.msg.agent { align-self:flex-start; background:var(--msg-agent); border:1px solid #e8e8e8; }
.msg .md { line-height:1.7; }
.msg .md p { margin:4px 0; }
.msg .md pre { background:#f0f0f0; border-radius:4px; padding:8px; overflow-x:auto; margin:6px 0; }
.msg .md code { font-size:13px; font-family:'Cascadia Code','Fira Code',monospace; }
.msg .md p > code { background:#e8e8e8; padding:1px 5px; border-radius:3px; font-size:13px; }
.msg .md table { border-collapse:collapse; width:100%; margin:6px 0; font-size:13px; }
.msg .md th,.md td { border:1px solid var(--border); padding:6px 10px; text-align:left; }
.msg .md th { background:var(--surface); }
.msg .md blockquote { border-left:3px solid var(--accent); padding:4px 12px; margin:6px 0; color:#888; }
.msg .time { font-size:11px; color:#bbb; margin-top:4px; }
.msg .tools { margin-top:6px; display:flex; flex-wrap:wrap; gap:4px; }
.msg .tool-tag { font-size:11px; background:var(--tool-bg); color:#666; padding:2px 8px; border-radius:4px; border:1px solid var(--border); }
.msg .thinking { margin-top:6px; font-size:12px; color:#888; background:var(--tool-bg); border-radius:4px; padding:6px 10px; cursor:pointer; border:1px solid var(--border); }
.msg .thinking summary { cursor:pointer; color:#666; }
.msg .thinking .tc { color:#888; font-style:italic; margin-top:4px; max-height:200px; overflow-y:auto; }
.waiting-dots::after { content:'...'; animation:dots 1.5s steps(4) infinite; }
@keyframes dots { 0% { content:''; } 25% { content:'.'; } 50% { content:'..'; } 75% { content:'...'; } }
#sidebar { width:0; overflow:hidden; background:var(--surface); border-right:1px solid var(--border); transition:width 0.2s; flex-shrink:0; display:flex; flex-direction:column; }
#sidebar.open { width:300px; }
#sidebar .sh { padding:10px 12px; border-bottom:1px solid var(--border); display:flex;  gap:8px; }
#sidebar .sh button { flex:1; padding:6px 0; border:1px solid var(--border); border-radius:6px; background:transparent; color:var(--text); font-size:12px; cursor:pointer; }
#sidebar .sh button:hover { background:#f0f0f0; }
#sidebar .sl { flex:1; overflow-y:auto; padding:4px 0; }
#sidebar .si { padding:8px 12px; font-size:12px; cursor:pointer; display:flex; align-items:flex-start; gap:6px; border-left:3px solid transparent; color:#555; }
#sidebar .si:hover { background:#f5f5f5; }
#sidebar .si.act { border-left-color:var(--accent); background:#e8f0fe; color:#333; }
#sidebar .si .t { flex:1; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; line-height:1.4; }
#sidebar .si .c { font-size:10px; color:#bbb; cursor:pointer; padding:2px; border-radius:3px; visibility:hidden; }
#sidebar .si:hover .c { visibility:visible; }
#sidebar .si .c:hover { background:#ddd; color:#666; }
#main { display:flex; flex-direction:column; min-width:0; flex:1;  }
#input-area { padding:14px 24px; background:var(--surface); border-top:1px solid var(--border); flex-shrink:0; display:flex; gap:10px;  width:100%; box-sizing:border-box; }
#input { flex:1; padding:12px 16px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text); font-size:14px; outline:none; min-width:0; width:100%; }
#input:focus { border-color:var(--accent); }
#send { padding:12px 24px; border:none; border-radius:8px; background:var(--accent); color:#fff; font-size:14px; font-weight:500; cursor:pointer; }
#send:disabled { opacity:0.4; cursor:not-allowed; }


</style>
</head>
<body>

<div id="header">
  <button id="menu-btn" style="background:none;border:none;color:var(--text);font-size:18px;cursor:pointer;padding:2px 6px;">&#x2630;</button>
  <img class="logo" src="/logo.png" alt="">
  <h1 id="title">Agent</h1>
  <span class="st" id="st">&#x25CB; 未连接</span>
</div>

<div id="chat" style="display:flex;flex-direction:row">
  <div id="sidebar">
    <div class="sh">
      <button onclick="newChat()">+ 新对话</button>
    </div>
    <div class="sl" id="session-list"></div>
  </div>
  
  <div id="main">
    <div id="msgs"></div>
    <div id="input-area">
      <input id="input" type="text" placeholder="输入消息..." autofocus>
      <button id="send" disabled>&#x1F680; 发送</button>
    </div>
  </div>
</div>

<script>
let sessionId = null;
const $ = id => document.getElementById(id);

marked.setOptions({ breaks: true, gfm: true });

function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function loadSessions() {
  try {
    const r = await fetch('/api/sessions');
    const d = await r.json();
    const sl = $('session-list'); sl.innerHTML = '';
    (d.sessions || []).forEach(s => {
      const div = document.createElement('div'); div.className = 'si';
      if (s.session_id === sessionId) div.classList.add('act');
      const txt = document.createElement('span'); txt.className = 't';
      txt.textContent = s.summary || '(空)';
      div.appendChild(txt);
      const close = document.createElement('span'); close.className = 'c';
      close.textContent = '×';
      close.onclick = (e) => { e.stopPropagation(); /* close not supported yet */ };
      div.appendChild(close);
      div.onclick = () => switchSession(s.session_id);
      sl.appendChild(div);
    });
  } catch(e) {}
}

function newChat() {
  $('msgs').innerHTML = '';
  sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  loadSessions();
}

async function switchSession(sid) {
  $('msgs').innerHTML = '';
  sessionId = sid;
  try {
    const r = await fetch('/api/sessions/' + encodeURIComponent(sid));
    const d = await r.json();
    (d.messages || []).forEach(m => {
      addMsg(m.role === 'user' ? 'user' : 'agent',
             m.role === 'user' ? esc(m.content).replace(/\n/g,'<br>') : renderMd(m.content));
    });
  } catch(e) { addMsg('agent', esc('加载失败: ' + e.message)); }
  loadSessions(); // 刷新高亮
}

function toggleSidebar() {
  const sb = $('sidebar');
  sb.classList.toggle('open');
}

function renderMd(text) {
  // 先转义，再用 marked 渲染
  let html = marked.parse(text);
  // 代码高亮
  document.querySelectorAll('pre code').forEach(b => {
    try { hljs.highlightElement(b); } catch(e) {}
  });
  return html;
}

function addMsg(role, html, opts) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = '<div class="md">' + html + '</div>';
  if (opts?.tools?.length) {
    const tw = document.createElement('div'); tw.className = 'tools';
    opts.tools.forEach(t => {
      const tag = document.createElement('span'); tag.className = 'tool-tag';
      tag.textContent = '&#x1F527; ' + t;
      tw.appendChild(tag);
    });
    div.appendChild(tw);
  }
  if (opts?.thinking) {
    const dt = document.createElement('details'); dt.className = 'thinking';
    dt.innerHTML = '<summary>&#x1F4AD; 推理过程</summary><div class="tc">' + esc(opts.thinking) + '</div>';
    div.appendChild(dt);
  }
  const time = document.createElement('div'); time.className = 'time';
  time.textContent = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
  div.appendChild(time);
  $('msgs').appendChild(div);
  $('msgs').scrollTop = $('msgs').scrollHeight;
  return div;
}

function addWait() {
  const div = document.createElement('div'); div.className = 'msg agent';
  div.id = 'wait-msg';
  div.innerHTML = '<div class="md"><p class="waiting-dots">思考中</p></div>';
  $('msgs').appendChild(div);
  $('msgs').scrollTop = $('msgs').scrollHeight;
  return div;
}

function rmWait() { const w = $('wait-msg'); if (w) w.remove(); }

function saveCfg() { /* unused */ }

async function chat() {
  const inp = $('input'); const txt = inp.value.trim(); if (!txt) return;
  inp.value = '';
  addMsg('user', esc(txt).replace(/\n/g,'<br>'));
  $('send').disabled = true; $('st').textContent = '\u25CF 处理中'; $('st').className = 'st busy';
  rmWait();

  // SSE 流式聊天
  const url = '/api/chat/stream?message=' + encodeURIComponent(txt) + '&session_id=' + (sessionId || 'default');
  const evtSource = new EventSource(url);

  let msgDiv = null;
  let fullText = '';

  evtSource.addEventListener('text', e => {
    if (!msgDiv) { msgDiv = addMsg('agent', ''); }
    fullText += e.data;
    msgDiv.querySelector('.md').innerHTML = renderMd(fullText);
    $('msgs').scrollTop = $('msgs').scrollHeight;
  });

  evtSource.addEventListener('done', e => {
    evtSource.close();
    if (!fullText && !msgDiv) addMsg('agent', esc('(空回复)'));
    $('send').disabled = false; $('st').textContent = '\u25CF 就绪'; $('st').className = 'st ok';
    $('input').focus();
    // 更新 sessionId（从 URL 参数获取）
    const urlParams = new URLSearchParams(evtSource.url.split('?')[1]);
    if (urlParams.get('session_id')) sessionId = urlParams.get('session_id');
  });

  evtSource.onerror = () => {
    evtSource.close();
    if (!msgDiv) addMsg('agent', esc('连接中断'));
    $('send').disabled = false; $('st').textContent = '\u25CF 就绪'; $('st').className = 'st ok';
  };
}

// Events
$('send').addEventListener('click', chat);
$('input').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); chat(); } });
$('menu-btn').addEventListener('click', toggleSidebar);

// Check config
// config auto-applied
</script>
</body>
</html>
